name: Build ImmortalWrt for Main Router (GDOCK / R619AC)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config-r619ac
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y build-essential gcc g++ git python3 unzip \
          zlib1g-dev libncurses5-dev gawk gettext

    - name: Clone ImmortalWrt source
      run: |
        git clone ${REPO_URL} -b ${REPO_BRANCH} immortalwrt
        cp ${CONFIG_FILE} immortalwrt/.config

    # ✅ Passwall 主仓库 + 依赖仓库
    - name: Add Passwall feeds
      working-directory: immortalwrt
      run: |
        echo "src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git" >> feeds.conf.default
        echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git" >> feeds.conf.default

    - name: Clone KuCat Theme + Config
      run: |
        cd immortalwrt/package
        git clone https://github.com/sirpdboy/luci-theme-kucat
        git clone https://github.com/sirpdboy/luci-app-kucat-config

    - name: Update Feeds
      working-directory: immortalwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ✅ 主路由 LAN 配置（最高优先级）
    # 只固定 IP，不覆盖 gateway / dns / netmask
    - name: Inject MAIN router LAN config
      working-directory: immortalwrt
      run: |
        mkdir -p files/etc/config
        cat > files/etc/config/network <<EOF
        config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.2.1'
        EOF

    - name: Build firmware (quiet mode)
      working-directory: immortalwrt
      run: |
        make defconfig --quiet
        make -j2 --quiet

    - name: Prepare .bin only
      working-directory: immortalwrt/bin
      run: |
        mkdir -p output
        find . -type f -name "*.bin" -exec cp {} output/ \;

    - name: Generate release tag
      run: |
        TAG=R619AC-MAIN-$(date +'%Y%m%d-%H%M')
        echo "TAG=$TAG" >> $GITHUB_ENV

    - name: Create Release (bin only)
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG }}
        name: ${{ env.TAG }}
        files: immortalwrt/bin/output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
