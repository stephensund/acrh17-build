name: Build ImmortalWrt for Main Router (GDOCK / R619AC)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config-r619ac
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y build-essential gcc g++ git python3 unzip zlib1g-dev libncurses5-dev gawk gettext

    - name: Clone ImmortalWrt source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH immortalwrt
        cp $CONFIG_FILE immortalwrt/.config

    - name: Clone KuCat Theme + Config
      run: |
        cd immortalwrt/package
        git clone https://github.com/sirpdboy/luci-theme-kucat
        git clone https://github.com/sirpdboy/luci-app-kucat-config

    - name: Update Feeds
      working-directory: immortalwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply LAN IP (Main Router)
      working-directory: immortalwrt
      run: |
        echo "Applying MAIN ROUTER LAN IP..."
        sed -i "s/option ipaddr.*/option ipaddr '192.168.2.1'/g" package/base-files/files/bin/config_generate

        # 不覆盖 gateway
        # 不覆盖 dns
        # 不覆盖 netmask
        echo "Skip gateway/dns/mask modification for main router."

    - name: Build firmware (quiet mode)
      working-directory: immortalwrt
      run: |
        make defconfig --quiet
        make -j2 --quiet    # 固定 j2，按你要求

    - name: Prepare .bin only
      working-directory: immortalwrt/bin
      run: |
        mkdir output
        find . -type f -name "*.bin" -exec cp {} output/ \;

    - name: Generate release tag
      id: gentag
      run: |
        TAG=R619AC-MAIN-$(date +'%Y%m%d-%H%M')
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo "Generated tag = $TAG"

    - name: Create Release (bin only)
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG }}
        name: ${{ env.TAG }}
        draft: false
        prerelease: false
        files: immortalwrt/bin/output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
