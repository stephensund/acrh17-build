name: Build ImmortalWrt for ACRH17 (AC42U Target)

on:
  workflow_dispatch:
    inputs:
      LAN_IP:
        description: "LAN IP address"
        required: true
        default: "192.168.2.11"
      LAN_GATEWAY:
        description: "Default gateway"
        required: true
        default: "192.168.2.1"
      LAN_MASK:
        description: "Subnet mask"
        required: true
        default: "255.255.255.0"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y build-essential gcc g++ git python3 unzip zlib1g-dev libncurses5-dev gawk gettext

    - name: Clone ImmortalWrt source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH immortalwrt
        cp $CONFIG_FILE immortalwrt/.config

    - name: Clone KuCat Theme + Config
      run: |
        cd immortalwrt/package
        git clone https://github.com/sirpdboy/luci-theme-kucat
        git clone https://github.com/sirpdboy/luci-app-kucat-config

    - name: Update Feeds
      working-directory: immortalwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply LAN IP modifications
      working-directory: immortalwrt
      run: |
        echo "Applying LAN settings..."
        sed -i "s/option ipaddr.*/option ipaddr '${{ github.event.inputs.LAN_IP }}'/g" package/base-files/files/bin/config_generate
        sed -i "s/option gateway.*/option gateway '${{ github.event.inputs.LAN_GATEWAY }}'/g" package/base-files/files/bin/config_generate
        sed -i "s/option netmask.*/option netmask '${{ github.event.inputs.LAN_MASK }}'/g" package/base-files/files/bin/config_generate

        if grep -q "option dns" package/base-files/files/bin/config_generate; then
            sed -i "s/option dns.*/option dns '${{ github.event.inputs.LAN_GATEWAY }}'/g" package/base-files/files/bin/config_generate
        else
            sed -i "/option gateway/a\ \toption dns '${{ github.event.inputs.LAN_GATEWAY }}'" package/base-files/files/bin/config_generate
        fi

    - name: Build firmware (quiet mode)
      working-directory: immortalwrt
      run: |
        make defconfig --quiet
        make -j2 --quiet           # << 这里按你的要求保留 j2

    - name: Prepare .bin only
      working-directory: immortalwrt/bin
      run: |
        mkdir output
        find . -type f -name "*.bin" -exec cp {} output/ \;

    - name: Generate release tag
      id: gentag
      run: |
        TAG=ACRH17-$(date +'%Y%m%d-%H%M')
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo "Generated tag = $TAG"

    - name: Create Release (bin only)
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG }}
        name: ${{ env.TAG }}
        draft: false
        prerelease: false
        files: immortalwrt/bin/output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
